<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap');
</style>
  <title>Frontend Mentor | Order summary card</title>

</head>
<body>
  <div class="wrapper">
    <div class="flex-container">
      <picture>
        <img src="/images/illustration-hero.svg" alt="A women enjoying her music" class="hero-img">
      </picture>
    <div class="summary">
      <h2 class="heading"> Order Summary</h2>
      <p class="summary-txt">
        You can now listen to millions of songs, audiobooks, and podcasts on any 
        device anywhere you like!
      </p>
    </div>
    <div class="pricing">
      <div class="icon">
        <picture class="img-icon">
          <img src="/images/icon-music.svg" alt="Music Icon" class="music-icon">
        </picture>
      </div>
      <div class="price-plan">
        <h3 class="plan">Annual Plan</h3>
        <p class="price">$59.99/year</p>
      </div>
      <div class="change">
        <a href="#" class="change-link">Change</a>
      </div>
    </div>
      <div class="payments-btns">
        <button type="button" class="payment-btn">Proceed to Payment
        </button>
        <button type="button" class="cancel-btn">Cancel Order</button>
      </div>
    </div>
  </div>
</body>
</html>
