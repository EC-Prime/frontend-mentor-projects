<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css"/>
  <title>Frontend Mentor | Blog preview card</title>

  
</head>
<body>
<div class="card">
  <div class="image">
    <center><img src="/assets/images/illustration-article.svg" alt="main-image"></center>
  </div>
  <div class="tab">
    <button class="tab-btn">Learning</button>
  </div>
  <p class="pub-date">Published 21 Dec 2023</p>
  <h1 class="heading">HTML & CSS foundations</h1>
<p. class="text">These languages are the backbone of every website, defining structure, content and presentation</p>
<section class="author">
  <picture class="author-img">
    <img src="/assets/images/image-avatar.webp" alt="Greg Cooper headshot image" class="author-img">
  </picture>
  <h4 class="author-name">Greg Hooper</h4>
</section>
</div>
  
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#"> EC_PRIME</a>.
  </footer>
</body>
</html>
