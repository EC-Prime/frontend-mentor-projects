<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap');
</style>
  <title>Frontend Mentor | NFT preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<div class="card">
<div class="img">
    <img src="/images/image-equilibrium.jpg" alt="Card hero image- Equilibrium #3429" class="hero-img">
  <div class="hero-overlay">
    <img src="/images/icon-view.svg" alt="view-icon image" class="view-icon">
 </div>
    
</div>

<div class="nft-txt">
  <h2 class="heading">Equilibrium #3429</h2>
  <p class="description">Our Equilibrium collection promotes balance and calm.</p>
</div>

<div class="nft-info">
<img src="/images/icon-ethereum.svg" alt="Ethereum icon image" class="ETH-img"><p class="ETH-value"> 0.041 ETH</p>

<img src="/images/icon-clock.svg" alt="ETH duration (3 days)" class="ETH-duration-img">
<p class="duration-txt"> 3 days left</p>
</div>
<div class="creator">
  <img src="/images/image-avatar.png" alt="Jules Wyvern" class="creator-img">
  <p class="creator"><span class="Author-light-txt">Creation of</span>  <span class="Author-Neutral-txt"> Jules Wyvern</span></p>
</div>
</div>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://github.com/EC-Prime">EC_PRIME</a>.
  </footer>
</body>
</html>
